<?xml version="1.0" encoding="UTF-8"?>
<!--
  iLink Bot authorisation flow — a sequence diagram showing how a user's
  WeChat account is bound to the QAI ModelBuilder service through the
  iLink Bot web console. Rendered on the "Help" dialog in WechatConfigPanel.

  Design notes:
    - viewBox is used (not fixed width/height) so the diagram scales with
      the modal width; the parent <img> in HelpButton clamps `max-width`.
    - Colour palette uses `stroke`/`fill` with `currentColor`-safe values,
      wrapped in a media-query <style> that flips the neutrals for dark
      mode. `system-ui, sans-serif` matches the app font stack.
    - No external <image href> refs; the SVG is fully self-contained.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 720 420"
     role="img"
     aria-label="iLink Bot first-time QR-code authorisation sequence diagram"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
     font-size="14">
  <style>
    .actor-box  { fill: #f5f7fa; stroke: #4b5563; stroke-width: 1.5; }
    .actor-txt  { fill: #111827; font-weight: 600; text-anchor: middle; }
    .lifeline   { stroke: #9ca3af; stroke-width: 1; stroke-dasharray: 4 4; }
    .arrow      { stroke: #2563eb; stroke-width: 1.8; fill: none; marker-end: url(#arrowHead); }
    .arrow-back { stroke: #10b981; stroke-width: 1.8; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrowHeadBack); }
    .msg        { fill: #111827; font-size: 12px; }
    .msg-back   { fill: #047857; font-size: 12px; }
    .step-num   { fill: #2563eb; font-weight: 700; font-size: 12px; }
    @media (prefers-color-scheme: dark) {
      .actor-box  { fill: #1f2937; stroke: #d1d5db; }
      .actor-txt  { fill: #f9fafb; }
      .lifeline   { stroke: #6b7280; }
      .arrow      { stroke: #60a5fa; }
      .arrow-back { stroke: #34d399; }
      .msg        { fill: #f3f4f6; }
      .msg-back   { fill: #6ee7b7; }
      .step-num   { fill: #60a5fa; }
    }
  </style>

  <defs>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb" />
    </marker>
    <marker id="arrowHeadBack" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Actor headers (three lifelines: User / iLink Web / QAI ModelBuilder) -->
  <g>
    <rect class="actor-box" x="40"  y="20" width="160" height="40" rx="6" />
    <text class="actor-txt" x="120" y="45">👤 User (WeChat)</text>

    <rect class="actor-box" x="280" y="20" width="160" height="40" rx="6" />
    <text class="actor-txt" x="360" y="45">🌐 iLink Bot Web</text>

    <rect class="actor-box" x="520" y="20" width="160" height="40" rx="6" />
    <text class="actor-txt" x="600" y="45">🖥 QAI ModelBuilder</text>
  </g>

  <!-- Lifelines -->
  <line class="lifeline" x1="120" y1="60"  x2="120" y2="400" />
  <line class="lifeline" x1="360" y1="60"  x2="360" y2="400" />
  <line class="lifeline" x1="600" y1="60"  x2="600" y2="400" />

  <!-- Step 1: User visits QAI ModelBuilder WeChat panel and clicks Connect -->
  <text class="step-num" x="50" y="95">1</text>
  <path class="arrow" d="M120 100 L600 100" />
  <text class="msg" x="250" y="93">Click "Connect WeChat" in settings</text>

  <!-- Step 2: Service returns iLink Bot QR page URL -->
  <text class="step-num" x="510" y="135">2</text>
  <path class="arrow-back" d="M600 140 L120 140" />
  <text class="msg-back" x="230" y="133">Open iLink Bot QR page</text>

  <!-- Step 3: User scans QR in WeChat app -->
  <text class="step-num" x="50" y="180">3</text>
  <path class="arrow" d="M120 185 L360 185" />
  <text class="msg" x="150" y="178">Scan QR code with WeChat</text>

  <!-- Step 4: iLink asks for auth confirmation -->
  <text class="step-num" x="270" y="220">4</text>
  <path class="arrow-back" d="M360 225 L120 225" />
  <text class="msg-back" x="150" y="218">"Authorise this bot?" prompt</text>

  <!-- Step 5: User confirms -->
  <text class="step-num" x="50" y="265">5</text>
  <path class="arrow" d="M120 270 L360 270" />
  <text class="msg" x="150" y="263">Tap "Confirm"</text>

  <!-- Step 6: iLink issues session token to QAI ModelBuilder -->
  <text class="step-num" x="380" y="305">6</text>
  <path class="arrow" d="M360 310 L600 310" />
  <text class="msg" x="380" y="303">Deliver session token (webhook)</text>

  <!-- Step 7: Service reports success to user -->
  <text class="step-num" x="510" y="345">7</text>
  <path class="arrow-back" d="M600 350 L120 350" />
  <text class="msg-back" x="200" y="343">Channel "Connected" + start receiving messages</text>

  <!-- Legend -->
  <g transform="translate(40, 380)">
    <line class="arrow" x1="0" y1="4" x2="30" y2="4" />
    <text class="msg" x="36" y="8">User action</text>
    <line class="arrow-back" x1="150" y1="4" x2="180" y2="4" />
    <text class="msg-back" x="186" y="8">System response</text>
  </g>
</svg>
