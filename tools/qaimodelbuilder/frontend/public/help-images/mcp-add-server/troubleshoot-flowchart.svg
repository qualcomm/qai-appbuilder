<?xml version="1.0" encoding="UTF-8"?>
<!--
  MCP connectivity troubleshoot flowchart — decision tree for "server won't
  connect", walked from the top diamond down to the leaf actions users can
  take without leaving the settings panel.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 720 540"
     role="img"
     aria-label="Flowchart for diagnosing MCP server connectivity failures"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
     font-size="13">
  <style>
    .start        { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
    .decision     { fill: #fef9c3; stroke: #ca8a04; stroke-width: 1.5; }
    .action       { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
    .done         { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.5; }
    .node-t       { fill: #0f172a; text-anchor: middle; font-weight: 500; }
    .edge         { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#edgeArrow); }
    .edge-yes     { stroke: #16a34a; }
    .edge-no      { stroke: #dc2626; }
    .edge-t       { fill: #0f172a; font-size: 11px; font-weight: 600; }
    @media (prefers-color-scheme: dark) {
      .start        { fill: #1e3a8a; stroke: #60a5fa; }
      .decision     { fill: #422006; stroke: #fbbf24; }
      .action       { fill: #14532d; stroke: #4ade80; }
      .done         { fill: #4c1d95; stroke: #c4b5fd; }
      .node-t       { fill: #f8fafc; }
      .edge         { stroke: #94a3b8; }
      .edge-yes     { stroke: #4ade80; }
      .edge-no      { stroke: #f87171; }
      .edge-t       { fill: #f8fafc; }
    }
  </style>

  <defs>
    <marker id="edgeArrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b" />
    </marker>
  </defs>

  <!-- Start -->
  <rect class="start" x="270" y="20" width="180" height="46" rx="23" />
  <text class="node-t" x="360" y="48">"Test connectivity" fails</text>

  <!-- Decision: command exists on PATH? -->
  <polygon class="decision"
           points="360,90  520,140  360,190  200,140"
           />
  <text class="node-t" x="360" y="136">Command on PATH?</text>
  <text class="node-t" x="360" y="154" font-size="11">(where / which command)</text>

  <!-- Decision: TCP/stdio reachable? -->
  <polygon class="decision"
           points="360,220  520,270  360,320  200,270"
           />
  <text class="node-t" x="360" y="266">Server actually starts?</text>
  <text class="node-t" x="360" y="284" font-size="11">(check stderr / logs)</text>

  <!-- Decision: proxy required? -->
  <polygon class="decision"
           points="360,350  520,400  360,450  200,400"
           />
  <text class="node-t" x="360" y="396">Corporate proxy in the way?</text>

  <!-- Action leaves -->
  <rect class="action" x="560" y="120" width="150" height="40" rx="6" />
  <text class="node-t" x="635" y="145">Install or fix PATH</text>

  <rect class="action" x="560" y="250" width="150" height="40" rx="6" />
  <text class="node-t" x="635" y="275">Fix args / restart daemon</text>

  <rect class="action" x="560" y="380" width="150" height="40" rx="6" />
  <text class="node-t" x="635" y="405">Set HTTP(S)_PROXY env</text>

  <!-- Done -->
  <rect class="done" x="270" y="470" width="180" height="46" rx="23" />
  <text class="node-t" x="360" y="498">✅ Retry — should connect</text>

  <!-- Edges -->
  <path class="edge" d="M360 66 L360 90" />

  <!-- decision 1 -->
  <path class="edge edge-yes" d="M360 190 L360 220" />
  <text class="edge-t" x="368" y="210">Yes</text>
  <path class="edge edge-no"  d="M520 140 L560 140" />
  <text class="edge-t" x="525" y="132">No</text>

  <!-- decision 2 -->
  <path class="edge edge-yes" d="M360 320 L360 350" />
  <text class="edge-t" x="368" y="340">Yes</text>
  <path class="edge edge-no"  d="M520 270 L560 270" />
  <text class="edge-t" x="525" y="262">No</text>

  <!-- decision 3 -->
  <path class="edge edge-no"  d="M360 450 L360 470" />
  <text class="edge-t" x="368" y="465">No</text>
  <path class="edge edge-yes" d="M520 400 L560 400" />
  <text class="edge-t" x="525" y="392">Yes</text>

  <!-- Action → back to retry (dashed feedback loops) -->
  <path class="edge" d="M635 160 Q 660 300 460 493" stroke-dasharray="4 4" />
  <path class="edge" d="M635 290 Q 660 380 460 495" stroke-dasharray="4 4" />
  <path class="edge" d="M635 420 Q 620 470 460 500" stroke-dasharray="4 4" />
</svg>
