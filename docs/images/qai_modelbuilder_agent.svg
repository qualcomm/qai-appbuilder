<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="1075" height="525">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0077cc"/>
      <stop offset="100%" style="stop-color:#00aaee"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0077cc"/>
    </marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c07800"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#008844"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#cccccc" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="420" rx="12" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="26" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="14" font-weight="700" fill="#1a3050" letter-spacing="0.5">
    QAI ModelBuilder — Agent Capabilities
  </text>
  <rect x="180" y="32" width="500" height="1.5" rx="1" fill="url(#blueGrad)" opacity="0.6"/>

  <!-- ══════════════ USER INPUT ══════════════ -->
  <rect x="16" y="155" width="132" height="82" rx="8"
        fill="#eef5ff" stroke="#0077cc" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="16" y="155" width="132" height="3" rx="0" fill="url(#blueGrad)"/>
  <text x="82" y="178" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" font-weight="700" fill="#004488">User Prompt</text>
  <rect x="50" y="185" width="64" height="34" rx="5"
        fill="#ffffff" stroke="#0077cc" stroke-width="0.9"/>
  <text x="82" y="197" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" fill="#336699">"Convert my model</text>
  <text x="82" y="208" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" fill="#336699"> and validate it"</text>
  <polygon points="68,219 78,219 73,226" fill="#ffffff" stroke="#0077cc" stroke-width="0.9"/>

  <!-- Arrow: User → Agent -->
  <line x1="149" y1="196" x2="194" y2="196" stroke="#0077cc" stroke-width="1.5"
        marker-end="url(#arrowBlue)" stroke-dasharray="5,3"/>

  <!-- ══════════════ AGENT CORE ══════════════ -->
  <rect x="198" y="128" width="154" height="138" rx="8"
        fill="#eef5ff" stroke="#0077cc" stroke-width="1.8" filter="url(#shadow)"/>
  <rect x="198" y="128" width="154" height="3" rx="0" fill="url(#blueGrad)"/>
  <text x="275" y="150" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="11.5" font-weight="700" fill="#004499">AI Agent</text>
  <text x="275" y="163" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" fill="#5580aa" letter-spacing="0.3">QAI ModelBuilder Core</text>

  <!-- Skill pills -->
  <rect x="212" y="172" width="126" height="19" rx="9.5"
        fill="#d8eaff" stroke="#0077cc" stroke-width="0.8"/>
  <text x="275" y="185" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8" fill="#004488">🔧 Model Builder Skill</text>

  <rect x="212" y="196" width="126" height="19" rx="9.5"
        fill="#d8eaff" stroke="#0077cc" stroke-width="0.8"/>
  <text x="275" y="209" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8" fill="#004488">📊 Inference Skill</text>

  <rect x="212" y="220" width="126" height="19" rx="9.5"
        fill="#d8eaff" stroke="#0077cc" stroke-width="0.8"/>
  <text x="275" y="233" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8" fill="#004488">🖥️ App Builder Skill</text>

  <rect x="212" y="246" width="126" height="14" rx="7"
        fill="#f0f6ff" stroke="#aaccee" stroke-width="0.7"/>
  <text x="275" y="256" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7" fill="#6688aa">Natural Language Planning</text>

  <!-- Arrow: Agent → Pipeline -->
  <line x1="352" y1="197" x2="396" y2="197" stroke="#c07800" stroke-width="1.8"
        marker-end="url(#arrowGold)"/>

  <!-- ══════════════ PIPELINE — Step 1 ══════════════ -->
  <rect x="400" y="55" width="182" height="88" rx="7"
        fill="#edfaf2" stroke="#008844" stroke-width="1.3" filter="url(#shadow)"/>
  <rect x="400" y="55" width="182" height="3" rx="0" fill="#00aa55"/>
  <text x="491" y="76" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" font-weight="700" fill="#006630">① Model Conversion</text>
  <text x="491" y="90" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8" fill="#338855">PyTorch / ONNX  →  QNN .bin / .dlc</text>

  <!-- precision badges -->
  <rect x="410" y="99" width="34" height="13" rx="6.5" fill="#d0f4e0" stroke="#008844" stroke-width="0.7"/>
  <text x="427" y="109" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="#006630">FP16</text>
  <rect x="450" y="99" width="38" height="13" rx="6.5" fill="#d0f4e0" stroke="#008844" stroke-width="0.7"/>
  <text x="469" y="109" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="#006630">W8A16</text>
  <rect x="494" y="99" width="34" height="13" rx="6.5" fill="#d0f4e0" stroke="#008844" stroke-width="0.7"/>
  <text x="511" y="109" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="#006630">W8A8</text>
  <rect x="534" y="99" width="34" height="13" rx="6.5" fill="#d0f4e0" stroke="#008844" stroke-width="0.7"/>
  <text x="551" y="109" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="#006630">W4A8</text>

  <text x="491" y="134" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" fill="#447755">Auto: export → quantize → context binary</text>

  <!-- Step 1 → Step 2 -->
  <line x1="491" y1="143" x2="491" y2="166" stroke="#c07800" stroke-width="1.5"
        marker-end="url(#arrowGold)"/>

  <!-- ══════════════ PIPELINE — Step 2 ══════════════ -->
  <rect x="400" y="170" width="182" height="104" rx="7"
        fill="#eef5ff" stroke="#0077cc" stroke-width="1.3" filter="url(#shadow)"/>
  <rect x="400" y="170" width="182" height="3" rx="0" fill="url(#blueGrad)"/>
  <text x="491" y="191" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" font-weight="700" fill="#004499">② Inference &amp; Validation</text>
  <text x="491" y="205" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8" fill="#336699">Auto-generate inference code</text>

  <!-- bar chart -->
  <rect x="418" y="214" width="22" height="36" rx="2" fill="#4499ee" opacity="0.85"/>
  <text x="429" y="257" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="6.5" fill="#446688">Original</text>
  <rect x="450" y="224" width="22" height="26" rx="2" fill="#22bb66" opacity="0.85"/>
  <text x="461" y="257" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="6.5" fill="#228844">QNN FP16</text>
  <rect x="482" y="230" width="22" height="20" rx="2" fill="#f5a623" opacity="0.85"/>
  <text x="493" y="257" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="6.5" fill="#aa7700">W8A8</text>
  <line x1="412" y1="250" x2="550" y2="250" stroke="#aabbcc" stroke-width="0.8"/>
  <text x="553" y="253" font-family="'Segoe UI',Arial,sans-serif" font-size="6.5" fill="#778899">ms</text>
  <text x="491" y="269" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" fill="#446699">Auto compare vs. original model</text>

  <!-- Step 2 → Step 3 -->
  <line x1="491" y1="274" x2="491" y2="294" stroke="#c07800" stroke-width="1.5"
        marker-end="url(#arrowGold)"/>

  <!-- ══════════════ PIPELINE — Step 3 ══════════════ -->
  <rect x="400" y="298" width="182" height="84" rx="7"
        fill="#fffbee" stroke="#c07800" stroke-width="1.3" filter="url(#shadow)"/>
  <rect x="400" y="298" width="182" height="3" rx="0" fill="#c07800"/>
  <text x="491" y="318" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" font-weight="700" fill="#8a5500">③ WebUI App Generation</text>

  <!-- browser mockup -->
  <rect x="418" y="326" width="146" height="44" rx="4"
        fill="#ffffff" stroke="#c07800" stroke-width="0.9"/>
  <rect x="418" y="326" width="146" height="13" rx="4" fill="#fff0cc" stroke="none"/>
  <circle cx="428" cy="332" r="2.5" fill="#ee4444" opacity="0.8"/>
  <circle cx="436" cy="332" r="2.5" fill="#f5a623" opacity="0.8"/>
  <circle cx="444" cy="332" r="2.5" fill="#22bb66" opacity="0.8"/>
  <rect x="452" y="329" width="104" height="7" rx="3.5" fill="#ffe8a0"/>
  <text x="491" y="351" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" fill="#886600">Ready-to-use WebUI · No code needed</text>
  <text x="491" y="363" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7" fill="#aa8830">Upload image / audio / text → Run on NPU</text>

  <!-- ══════════════ OUTPUTS ══════════════ -->
  <!-- Output 1: QNN Model -->
  <rect x="628" y="55" width="206" height="56" rx="7"
        fill="#edfaf2" stroke="#008844" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="731" y="76" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="9.5" font-weight="700" fill="#006630">QNN Model Package</text>
  <text x="731" y="90" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8" fill="#338855">.bin / .dlc  ·  Multi-precision variants</text>
  <text x="731" y="103" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" fill="#447766">Ready for Snapdragon NPU deployment</text>

  <!-- Output 2: Inference Code -->
  <rect x="628" y="170" width="206" height="56" rx="7"
        fill="#eef5ff" stroke="#0077cc" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="731" y="191" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="9.5" font-weight="700" fill="#004499">Inference Code + Report</text>
  <text x="731" y="205" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8" fill="#336699">Auto-generated runner.py</text>
  <text x="731" y="218" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" fill="#446688">Latency · Accuracy · vs. Original</text>

  <!-- Output 3: WebUI App -->
  <rect x="628" y="298" width="206" height="56" rx="7"
        fill="#fffbee" stroke="#c07800" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="731" y="319" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="9.5" font-weight="700" fill="#8a5500">WebUI Application</text>
  <text x="731" y="333" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8" fill="#996600">One-click NPU inference workbench</text>
  <text x="731" y="346" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="7.5" fill="#aa7700">OCR · ASR · TTS · SR · CV</text>

  <!-- Connector lines: pipeline → outputs -->
  <line x1="582" y1="99" x2="606" y2="99" stroke="#008844" stroke-width="1" opacity="0.6"/>
  <line x1="606" y1="83" x2="626" y2="83" stroke="#008844" stroke-width="1" opacity="0.6" marker-end="url(#arrowGreen)"/>
  <line x1="606" y1="99" x2="606" y2="83" stroke="#008844" stroke-width="1" opacity="0.6"/>

  <line x1="582" y1="197" x2="626" y2="197" stroke="#0077cc" stroke-width="1" opacity="0.6" marker-end="url(#arrowBlue)"/>

  <line x1="582" y1="340" x2="606" y2="340" stroke="#c07800" stroke-width="1" opacity="0.6"/>
  <line x1="606" y1="326" x2="626" y2="326" stroke="#c07800" stroke-width="1" opacity="0.6" marker-end="url(#arrowGold)"/>
  <line x1="606" y1="340" x2="606" y2="326" stroke="#c07800" stroke-width="1" opacity="0.6"/>

  <!-- ══════════════ BOTTOM NOTE ══════════════ -->
  <rect x="16" y="390" width="828" height="22" rx="5"
        fill="#f0f5ff" stroke="#c0d4ee" stroke-width="0.8"/>
  <text x="430" y="405" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="8.5" fill="#3a5a88" letter-spacing="0.3">
    All steps driven by a single natural language prompt — no command-line or coding knowledge required
  </text>
</svg>
